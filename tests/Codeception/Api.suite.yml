# Codeception Test Suite Configuration
#
# Suite for api tests
# Emulate web requests and make application process them
# Include one of framework modules (Symfony2, Yii2, Laravel5) to use it
# Remove this suite if you don't use frameworks

actor: ApiTester
modules:
    enabled:
        - \AppTests\Codeception\Support\Helper\Api
        - Symfony:
            app_path: 'src'
            environment: 'test'
        - Doctrine:
            depends: Symfony
            cleanup: true
        - REST:
            depends: Symfony
            url: /
        - Asserts
        - Elvi\CodeceptionHelpers\Api:
            depends:
              - Asserts
              - REST
              - Symfony
        - Elvi\CodeceptionHelpers\Asserts:
            depends:
              - Asserts
        - Elvi\CodeceptionHelpers\Cli:
            depends:
              - Asserts
              - Symfony
        - Elvi\CodeceptionHelpers\ServiceMocker:
            depends:
              - Symfony

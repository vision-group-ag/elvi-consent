# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices/configuration.html#application-related-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Dto/'
            - '../src/Kernel.php'
            - '../src/Tests/'

    # controllers are imported separately to make sure services can be injected
    # as action arguments even if you don't extend any base controller class
    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    Symfony\Component\Serializer\NameConverter\CamelCaseToSnakeCaseNameConverter: ~

    Sentry\Monolog\Handler:
        arguments:
            $hub: '@Sentry\State\HubInterface'
            $level: !php/const Monolog\Logger::ERROR
            $bubble: false

    customer.external_identifier_filter:
      parent: 'api_platform.doctrine.orm.search_filter'
      arguments: [ { externalIdentifier: 'exact'} ]
      tags:  [ 'api_platform.filter' ]
      autowire: false
      autoconfigure: false
      public: false

    customer.decision_date_filter:
      parent: 'api_platform.doctrine.orm.date_filter'
      arguments: [{ decisionDate: ~ }]
      tags: ['api_platform.filter']
      autowire: false
      autoconfigure: false
      public: false

    App\Service\ConsentService:
        arguments:
            $emitImportEvents: '%env(bool:EMIT_IMPORT_EVENTS)%'
            $eventBus: '@event.bus'

    App\Repository\Historical\CustomerEntityRepositoryInterface:
#      class: App\Repository\Historical\CustomerEntityRepository
#      arguments:
#        $historicalConnection: '@doctrine.dbal.historical_connection'
      class: App\Repository\Historical\InMemoryCustomerEntityRepository
      arguments:
        $emails:
          - 'test-customer-123@test.com'
          - 'test-customer-005@test.com'
          - 'test-customer-004@test.com'
          - 'test-customer-003@test.com'
          - 'test-customer-002@test.com'
          - 'test-customer-001@test.com'

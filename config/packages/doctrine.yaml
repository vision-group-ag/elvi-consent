parameters:
    historical_database_url_fallback: '%env(resolve:DATABASE_URL)%'

doctrine:
  dbal:
    connections:
      default:
        url: '%env(resolve:DATABASE_URL)%'
        charset: utf8mb4
        default_table_options:
            charset: utf8mb4
            collation: utf8mb4_unicode_ci
        options:
            !php/const PDO::MYSQL_ATTR_SSL_CA: ''
            !php/const PDO::MYSQL_ATTR_SSL_VERIFY_SERVER_CERT: false
      historical:
        url: '%env(default:historical_database_url_fallback:HISTORICAL_DATABASE_URL)%'
        charset: utf8mb4
        default_table_options:
          charset: utf8mb4
          collation: utf8mb4_unicode_ci
        options:
          !php/const PDO::MYSQL_ATTR_SSL_CA: ''
          !php/const PDO::MYSQL_ATTR_SSL_VERIFY_SERVER_CERT: false

  orm:
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                is_bundle: false
                type: xml
                dir: '%kernel.project_dir%/config/doctrine'
                prefix: 'App\Entity'
                alias: App

namespace: AppTests\_support
paths:
    tests: tests
    output: tests/_output
    data: tests/_data
    support: tests/_support
    envs: tests/_envs
actor_suffix: Tester
extensions:
    enabled:
        - Codeception\Extension\RunFailed
params:
    - .env
coverage:
    enabled: true
    remote: true
    remote_config: codeception.yml
    include:
        - src/*
    exclude: # optional
        - src/AppBundle/spec/*
